description: |
  Accumulates input movement from a standing start and blocks all events
  until the total magnitude crosses a threshold. Resets after a configurable
  idle period with no input.

  Example:
    &movement_threshold 100 1000

  param1: threshold — minimum total movement (sum of |dx| + |dy|) in raw
          sensor counts required before events are passed through.
  param2: idle-ms — milliseconds of no input after which the accumulator
          resets and the next movement starts gated again.

compatible: "zmk,input-processor-movement-threshold"

include: ip_two_param.yaml
